<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for Julia colors -->
    <linearGradient id="juliaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CB3C33;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#9558B2;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#389826;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4063D8;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Electric arc gradient -->
    <linearGradient id="electricGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4063D8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#389826;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="#1a1a2e" opacity="0.95"/>
  
  <!-- Outer ring with Julia gradient -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="url(#juliaGradient)" stroke-width="4" opacity="0.6"/>
  
  <!-- Power grid network nodes (representing OPF nodes) -->
  <g id="gridNodes">
    <!-- Top node -->
    <circle cx="200" cy="80" r="12" fill="#CB3C33" filter="url(#glow)"/>
    <!-- Top right -->
    <circle cx="280" cy="140" r="12" fill="#9558B2" filter="url(#glow)"/>
    <!-- Right -->
    <circle cx="300" cy="220" r="12" fill="#389826" filter="url(#glow)"/>
    <!-- Bottom right -->
    <circle cx="260" cy="300" r="12" fill="#4063D8" filter="url(#glow)"/>
    <!-- Bottom left -->
    <circle cx="140" cy="300" r="12" fill="#CB3C33" filter="url(#glow)"/>
    <!-- Left -->
    <circle cx="100" cy="220" r="12" fill="#9558B2" filter="url(#glow)"/>
    <!-- Top left -->
    <circle cx="120" cy="140" r="12" fill="#389826" filter="url(#glow)"/>
  </g>
  
  <!-- Power lines connecting nodes -->
  <g id="powerLines" stroke="url(#electricGradient)" stroke-width="2.5" fill="none" opacity="0.7">
    <line x1="200" y1="80" x2="280" y2="140"/>
    <line x1="280" y1="140" x2="300" y2="220"/>
    <line x1="300" y1="220" x2="260" y2="300"/>
    <line x1="260" y1="300" x2="140" y2="300"/>
    <line x1="140" y1="300" x2="100" y2="220"/>
    <line x1="100" y1="220" x2="120" y2="140"/>
    <line x1="120" y1="140" x2="200" y2="80"/>
    <!-- Cross connections for network -->
    <line x1="200" y1="80" x2="200" y2="200" opacity="0.5"/>
    <line x1="280" y1="140" x2="140" y2="300" opacity="0.5"/>
    <line x1="120" y1="140" x2="300" y2="220" opacity="0.5"/>
  </g>
  
  <!-- Central optimization symbol (mathematical omega for optimization) -->
  <g id="centerSymbol">
    <!-- Power symbol circle -->
    <circle cx="200" cy="200" r="50" fill="none" stroke="url(#juliaGradient)" stroke-width="6" filter="url(#glow)"/>
    
    <!-- Lightning bolt for power -->
    <path d="M 210 170 L 190 200 L 200 200 L 185 230 L 215 195 L 205 195 Z" 
          fill="#ffffff" opacity="0.9" filter="url(#glow)"/>
  </g>
  
  <!-- Text: PowerLASCOPF -->
  <text x="200" y="360" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="url(#juliaGradient)" text-anchor="middle" letter-spacing="1">
    PowerLASCOPF
  </text>
  
  <!-- Subtitle: .jl -->
  <text x="200" y="385" font-family="monospace" font-size="18" 
        fill="#9558B2" text-anchor="middle" opacity="0.9">
    .jl
  </text>
  
  <!-- Small circuit traces decoration -->
  <g opacity="0.3" stroke="#4063D8" stroke-width="1" fill="none">
    <path d="M 20 200 L 40 200 L 45 195 L 55 205 L 60 200 L 80 200"/>
    <path d="M 320 200 L 340 200 L 345 195 L 355 205 L 360 200 L 380 200"/>
    <path d="M 200 20 L 200 40 L 195 45 L 205 55 L 200 60 L 200 80"/>
    <path d="M 200 320 L 200 340 L 195 345 L 205 355 L 200 360 L 200 380"/>
  </g>
</svg>