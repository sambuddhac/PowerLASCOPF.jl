<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow filters for each color -->
    <filter id="greenGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#389826" flood-opacity="0.8"/>
      <feComposite in2="blur" operator="in" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="blueGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#4063D8" flood-opacity="0.8"/>
      <feComposite in2="blur" operator="in" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="redGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#CB3C33" flood-opacity="0.8"/>
      <feComposite in2="blur" operator="in" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="whiteGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark background -->
  <rect width="400" height="400" fill="#2b2d42"/>
  
  <!-- Outer metallic ring -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="url(#metalGradient)" stroke-width="8" opacity="0.6"/>
  <circle cx="200" cy="200" r="175" fill="none" stroke="#1a1a2e" stroke-width="3"/>
  
  <defs>
    <linearGradient id="metalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#666666"/>
      <stop offset="50%" style="stop-color:#aaaaaa"/>
      <stop offset="100%" style="stop-color:#666666"/>
    </linearGradient>
  </defs>
  
  <!-- Connection lines with glow -->
  <g stroke="#ffffff" stroke-width="2" fill="none" filter="url(#whiteGlow)" opacity="0.7">
    <!-- Triangle main connections -->
    <line x1="200" y1="130" x2="140" y2="230"/>
    <line x1="200" y1="130" x2="260" y2="230"/>
    <line x1="140" y1="230" x2="260" y2="230"/>
    
    <!-- Small node connections -->
    <line x1="200" y1="130" x2="185" y2="160"/>
    <line x1="200" y1="130" x2="220" y2="155"/>
    <line x1="140" y1="230" x2="170" y2="210"/>
    <line x1="260" y1="230" x2="230" y2="200"/>
  </g>
  
  <!-- Main power nodes (Julia colors) -->
  <!-- Green node (top) -->
  <circle cx="200" cy="130" r="25" fill="#389826" filter="url(#greenGlow)"/>
  <circle cx="200" cy="130" r="20" fill="#90ee90" opacity="0.8"/>
  <circle cx="200" cy="130" r="15" fill="#c5f7c5"/>
  
  <!-- Blue node (bottom left) -->
  <circle cx="140" cy="230" r="25" fill="#4063D8" filter="url(#blueGlow)"/>
  <circle cx="140" cy="230" r="20" fill="#6b9aff" opacity="0.8"/>
  <circle cx="140" cy="230" r="15" fill="#a8c9ff"/>
  
  <!-- Red node (bottom right) -->
  <circle cx="260" cy="230" r="25" fill="#CB3C33" filter="url(#redGlow)"/>
  <circle cx="260" cy="230" r="20" fill="#ff6b6b" opacity="0.8"/>
  <circle cx="260" cy="230" r="15" fill="#ffa8a8"/>
  
  <!-- Small white connector nodes -->
  <circle cx="185" cy="160" r="4" fill="#ffffff" filter="url(#whiteGlow)"/>
  <circle cx="220" cy="155" r="4" fill="#ffffff" filter="url(#whiteGlow)"/>
  <circle cx="170" cy="210" r="4" fill="#ffffff" filter="url(#whiteGlow)"/>
  <circle cx="230" cy="200" r="4" fill="#ffffff" filter="url(#whiteGlow)"/>
  
  <!-- Lightning bolt in "L" -->
  <defs>
    <linearGradient id="lightningGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffff00"/>
      <stop offset="100%" style="stop-color:#ffaa00"/>
    </linearGradient>
  </defs>
  
  <!-- Text: PowerLASCOPF.jl with color gradient -->
  <text x="200" y="305" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" letter-spacing="0">
    <tspan fill="#4063D8">Power</tspan><tspan fill="#ffdd00">⚡</tspan><tspan fill="#389826">ASCOPF</tspan><tspan fill="#CB3C33">.jl</tspan>
  </text>
  
  <!-- Sparkle decoration (bottom right) -->
  <g transform="translate(340, 340)">
    <path d="M 0,-8 L 1,-1 L 8,0 L 1,1 L 0,8 L -1,1 L -8,0 L -1,-1 Z" fill="#aaaaaa" opacity="0.5"/>
  </g>
</svg>